name: build

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "*"
  pull_request:

jobs:
  build:
    name: py${{ matrix.python-version }} / pandas ${{ matrix.pandas-line }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - python-version: "3.11"
            pandas-line: "1.x"
            numpy-install: 'pip install --upgrade "numpy<2"'
            pandas-install: 'pip install --upgrade "pandas>=1,<2"'
            upload-coverage: "false"
          - python-version: "3.11"
            pandas-line: "2.x"
            numpy-install: 'pip install --upgrade "numpy>=2"'
            pandas-install: 'pip install --upgrade "pandas>=2,<3"'
            upload-coverage: "false"
          - python-version: "3.12"
            pandas-line: "2.x"
            numpy-install: 'pip install --upgrade "numpy>=2"'
            pandas-install: 'pip install --upgrade "pandas>=2,<3"'
            upload-coverage: "true"
          - python-version: "3.13"
            pandas-line: "2.x"
            numpy-install: 'pip install --upgrade "numpy>=2"'
            pandas-install: 'pip install --upgrade "pandas>=2,<3"'
            upload-coverage: "false"
          - python-version: "3.14"
            pandas-line: "2.x"
            numpy-install: 'pip install --upgrade "numpy>=2"'
            pandas-install: 'pip install --upgrade "pandas>=2,<3"'
            upload-coverage: "false"
          - python-version: "3.11"
            pandas-line: "3.x"
            numpy-install: 'pip install --upgrade "numpy>=2"'
            pandas-install: 'pip install --upgrade --pre "pandas>=3,<4"'
            upload-coverage: "false"
          - python-version: "3.12"
            pandas-line: "3.x"
            numpy-install: 'pip install --upgrade "numpy>=2"'
            pandas-install: 'pip install --upgrade --pre "pandas>=3,<4"'
            upload-coverage: "false"
          - python-version: "3.13"
            pandas-line: "3.x"
            numpy-install: 'pip install --upgrade "numpy>=2"'
            pandas-install: 'pip install --upgrade --pre "pandas>=3,<4"'
            upload-coverage: "false"
          - python-version: "3.14"
            pandas-line: "3.x"
            numpy-install: 'pip install --upgrade "numpy>=2"'
            pandas-install: 'pip install --upgrade --pre "pandas>=3,<4"'
            upload-coverage: "false"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Create virtual environment
      run: |
        python -m venv .venv
        echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
        echo "$PWD/.venv/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        python -c "import sys; print(sys.version)"
        pip install --upgrade pip
        pip install maturin
        pip install -e .[dev]

    - name: Build Rust extension
      run: |
        maturin develop --release

    - name: Install NumPy and pandas ${{ matrix.pandas-line }}
      run: |
        set -euo pipefail
        ${{ matrix.numpy-install }}
        ${{ matrix.pandas-install }}
        python -c "import numpy as np; import pandas as pd; print('numpy', np.__version__); print('pandas', pd.__version__)"

    - name: Run tests with coverage
      run: |
        set -euo pipefail
        make test-coverage
      env:
        STOCK_PANDAS_COW: "1"

    - name: Upload coverage to Codecov
      if: matrix.upload-coverage == 'true'
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
